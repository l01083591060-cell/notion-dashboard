<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>대시보드</title>

<style>
body{
font-family:sans-serif;
background:#fffafb;
padding:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
max-width:1000px;
margin:auto;
}

.card{
background:white;
border:1px solid #ffdce8;
border-radius:16px;
padding:16px;
}

.list{
margin-top:10px;
display:flex;
flex-direction:column;
gap:6px;
}

.item{
display:flex;
gap:6px;
align-items:center;
}

input[type=text]{
width:100%;
padding:6px;
margin-top:8px;
}

button{
margin-top:6px;
padding:6px;
background:#f7c6d9;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<h1 style="text-align:center">대시보드</h1>

<div class="grid">

<div class="card" data-category="독서일기">
<h3>독서일기</h3>
<div class="list"></div>
<input type="text" placeholder="책 입력">
<button>추가</button>
</div>

<div class="card" data-category="감정일기">
<h3>감정일기</h3>
<div class="list"></div>
<input type="text" placeholder="감정 입력">
<button>추가</button>
</div>

<div class="card" data-category="가계부">
<h3>가계부</h3>
<div class="list"></div>
<input type="text" placeholder="지출 입력">
<button>추가</button>
</div>

<div class="card" data-category="스터디">
<h3>스터디</h3>
<div class="list"></div>
<input type="text" placeholder="공부 입력">
<button>추가</button>
</div>

<div class="card" data-category="오답노트">
<h3>오답노트</h3>
<div class="list"></div>
<input type="text" placeholder="오답 입력">
<button>추가</button>
</div>

<div class="card" data-category="식단">
<h3>식단</h3>
<div class="list"></div>
<input type="text" placeholder="식단 입력">
<button>추가</button>
</div>

</div>

<script>

const API="/api/notion"

async function load(){

const res=await fetch(API)
const data=await res.json()

document.querySelectorAll(".card").forEach(card=>{

const category=card.dataset.category
const list=card.querySelector(".list")
list.innerHTML=""

data.tasks
.filter(t=>t.category===category)
.forEach(t=>{

const row=document.createElement("div")
row.className="item"

row.innerHTML=`
<input type="checkbox" ${t.done?"checked":""}>
<span>${t.name}</span>
`

row.querySelector("input").addEventListener("change",async(e)=>{

await fetch(API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"toggle",
id:t.id,
done:e.target.checked
})
})

load()

})

list.appendChild(row)

})

})

}

document.querySelectorAll(".card").forEach(card=>{

const input=card.querySelector("input")
const button=card.querySelector("button")
const category=card.dataset.category

button.onclick=async()=>{

if(!input.value) return

await fetch(API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"add",
name:input.value,
category:category
})
})

input.value=""
load()

}

})

load()

</script>

</body>
</html>
