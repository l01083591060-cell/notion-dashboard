<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>내 대시보드</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
      background:
        radial-gradient(circle at top, #fff4f8 0%, #fffafb 38%, #fffdfd 100%);
      color: #4c3e45;
      padding: 22px;
    }

    .wrap {
      max-width: 1120px;
      margin: 0 auto;
    }

    .hero {
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(10px);
      border: 1px solid #ffe0ea;
      border-radius: 30px;
      padding: 24px;
      box-shadow: 0 12px 35px rgba(245, 194, 214, 0.18);
      margin-bottom: 18px;
    }

    .hero-top {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 10px;
    }

    .title-input {
      flex: 1;
      min-width: 220px;
      border: 1px solid #ffdce8;
      background: #ffffff;
      color: #4c3e45;
      border-radius: 16px;
      padding: 13px 15px;
      font-size: 15px;
      font-weight: 700;
      outline: none;
    }

    .save-btn {
      border: 0;
      background: linear-gradient(135deg, #f7c6d9, #f4b5cd);
      color: white;
      border-radius: 16px;
      padding: 13px 16px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(244, 181, 205, 0.22);
    }

    .save-btn:hover {
      filter: brightness(0.98);
    }

    .hero-title {
      font-size: 31px;
      font-weight: 900;
      letter-spacing: -0.04em;
      margin-bottom: 6px;
      word-break: break-word;
      color: #5b4450;
    }

    .hero-sub {
      font-size: 14px;
      color: #967985;
      line-height: 1.6;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .card {
      background: rgba(255,255,255,0.88);
      border: 1px solid #ffe3ec;
      border-radius: 26px;
      padding: 16px;
      height: 320px;
      box-shadow: 0 10px 26px rgba(255, 222, 234, 0.18);
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: hidden;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .card h3 {
      font-size: 17px;
      font-weight: 900;
      color: #5c4650;
      letter-spacing: -0.02em;
    }

    .badge {
      font-size: 11px;
      color: #c27e9a;
      background: #fff5f8;
      border: 1px solid #ffdce8;
      border-radius: 999px;
      padding: 5px 9px;
      white-space: nowrap;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding-right: 2px;
    }

    .list::-webkit-scrollbar,
    .book-grid::-webkit-scrollbar,
    .memo-box::-webkit-scrollbar {
      width: 7px;
    }

    .list::-webkit-scrollbar-thumb,
    .book-grid::-webkit-scrollbar-thumb,
    .memo-box::-webkit-scrollbar-thumb {
      background: #f3cada;
      border-radius: 999px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid #ffe3ec;
      background: #fff9fb;
      border-radius: 16px;
      padding: 11px 12px;
      min-width: 0;
    }

    .item.done span {
      text-decoration: line-through;
      color: #b29ca5;
    }

    .item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #f0a7c3;
      flex-shrink: 0;
    }

    .item span {
      font-size: 14px;
      line-height: 1.4;
      word-break: break-word;
    }

    .empty {
      border: 1px dashed #ffd9e6;
      background: #fff9fb;
      color: #a48c97;
      border-radius: 16px;
      padding: 13px;
      font-size: 13px;
    }

    .add-row {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .add-row input {
      flex: 1;
      min-width: 0;
      border: 1px solid #ffdce8;
      background: #fff;
      border-radius: 15px;
      padding: 11px 12px;
      font-size: 14px;
      color: #4c3e45;
      outline: none;
    }

    .add-row button {
      border: 0;
      background: #f7c6d9;
      color: #fff;
      border-radius: 15px;
      padding: 11px 14px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .add-row button:hover {
      background: #f2b2cb;
    }

    .book-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      align-content: start;
      padding-right: 2px;
    }

    .book-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .book-cover {
      width: 100%;
      aspect-ratio: 0.72 / 1;
      border-radius: 16px;
      background:
        linear-gradient(145deg, #f3b7ce 0%, #f8d7e4 58%, #fff2f7 100%);
      border: 1px solid #ffd6e3;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.8),
        0 10px 18px rgba(241, 181, 205, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 22px;
      font-weight: 900;
      text-shadow: 0 1px 4px rgba(198, 112, 150, 0.25);
      padding: 8px;
    }

    .book-title {
      font-size: 12px;
      line-height: 1.35;
      color: #6b545f;
      text-align: center;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      word-break: break-word;
    }

    .book-empty {
      border: 1px dashed #ffd9e6;
      background: #fff9fb;
      color: #a48c97;
      border-radius: 16px;
      padding: 13px;
      font-size: 13px;
    }

    .calendar-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #7e6671;
      flex-shrink: 0;
    }

    .week {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      font-size: 12px;
      color: #b28d9d;
      text-align: center;
      flex-shrink: 0;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      overflow: hidden;
    }

    .day {
      aspect-ratio: 1 / 1;
      border-radius: 12px;
      background: #fff8fb;
      border: 1px solid #ffe2ec;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #694f5b;
    }

    .day.empty {
      border: none;
      background: transparent;
    }

    .day.today {
      background: linear-gradient(135deg, #f3b9d0, #f7cadb);
      border-color: #f3b9d0;
      color: #fff;
      font-weight: 800;
    }

    .player-wrap {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
      min-height: 0;
    }

    .player-box {
      flex: 1;
      min-height: 0;
      background: #fff9fb;
      border: 1px solid #ffe2ec;
      border-radius: 18px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .player-note {
      font-size: 13px;
      color: #8e717d;
    }

    .player-frame {
      width: 100%;
      height: 92px;
      border: 0;
      border-radius: 14px;
      background: #fff;
      display: block;
      flex-shrink: 0;
    }

    .small-note {
      font-size: 12px;
      color: #ab8f9a;
      line-height: 1.5;
    }

    .memo-box {
      flex: 1;
      min-height: 0;
      border: 1px solid #ffe2ec;
      background: #fff9fb;
      border-radius: 18px;
      padding: 14px;
      resize: none;
      outline: none;
      font-size: 14px;
      line-height: 1.7;
      color: #6f5963;
      overflow-y: auto;
    }

    .meta-row {
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }

    .meta-box {
      flex: 1;
      background: #fff9fb;
      border: 1px solid #ffe2ec;
      border-radius: 16px;
      padding: 12px;
    }

    .meta-label {
      font-size: 12px;
      color: #b08998;
      margin-bottom: 6px;
      font-weight: 700;
    }

    .meta-value {
      font-size: 18px;
      font-weight: 900;
      color: #6b525d;
    }

    @media (max-width: 980px) {
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 620px) {
      body { padding: 14px; }
      .grid { grid-template-columns: 1fr; }
      .hero-title { font-size: 24px; }
      .hero-top { flex-direction: column; align-items: stretch; }
      .book-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="hero-top">
        <input
          type="text"
          id="dashboardTitleInput"
          class="title-input"
          placeholder="대시보드 이름 입력"
        />
        <button class="save-btn" id="saveTitleBtn">제목 저장</button>
      </div>
      <div class="hero-title" id="dashboardTitle">내 대시보드</div>
      <div class="hero-sub" id="todayText">로딩 중...</div>
    </section>

    <section class="grid">
      <article class="card" data-category="독서일기">
        <div class="card-header">
          <h3>독서일기</h3>
          <span class="badge">Book</span>
        </div>
        <div class="list book-grid"></div>
        <div class="add-row">
          <input type="text" placeholder="책 이름 입력" />
          <button>추가</button>
        </div>
      </article>

      <article class="card" data-category="감정일기">
        <div class="card-header">
          <h3>감정일기</h3>
          <span class="badge">Sync</span>
        </div>
        <div class="list"></div>
        <div class="add-row">
          <input type="text" placeholder="오늘 감정 한 줄" />
          <button>추가</button>
        </div>
      </article>

      <article class="card" data-category="가계부">
        <div class="card-header">
          <h3>가계부</h3>
          <span class="badge">Sync</span>
        </div>
        <div class="list"></div>
        <div class="add-row">
          <input type="text" placeholder="지출 / 수입 메모" />
          <button>추가</button>
        </div>
      </article>

      <article class="card" data-category="스터디">
        <div class="card-header">
          <h3>스터디</h3>
          <span class="badge">Sync</span>
        </div>
        <div class="list"></div>
        <div class="add-row">
          <input type="text" placeholder="오늘 공부할 것" />
          <button>추가</button>
        </div>
      </article>

      <article class="card" data-category="오답노트">
        <div class="card-header">
          <h3>오답노트</h3>
          <span class="badge">Sync</span>
        </div>
        <div class="list"></div>
        <div class="add-row">
          <input type="text" placeholder="틀린 개념 추가" />
          <button>추가</button>
        </div>
      </article>

      <article class="card" data-category="식단">
        <div class="card-header">
          <h3>식단</h3>
          <span class="badge">Sync</span>
        </div>
        <div class="list"></div>
        <div class="add-row">
          <input type="text" placeholder="먹은 것 / 식단 기록" />
          <button>추가</button>
        </div>
      </article>

      <article class="card">
        <div class="card-header">
          <h3>달력</h3>
          <span class="badge">Today</span>
        </div>
        <div class="calendar-head">
          <span id="monthLabel"></span>
        </div>
        <div class="week">
          <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
      </article>

      <article class="card">
        <div class="card-header">
          <h3>플레이어</h3>
          <span class="badge">Music</span>
        </div>
        <div class="add-row">
          <input type="text" id="playlistInput" placeholder="유튜브 플레이리스트 링크 붙여넣기" />
          <button id="savePlaylistBtn">저장</button>
        </div>
        <div class="player-wrap">
          <div class="player-box">
            <div class="player-note">재생바만 표시</div>
            <iframe
              id="playlistFrame"
              class="player-frame"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen>
            </iframe>
          </div>
          <div class="small-note">링크만 넣고 저장하면 바뀜</div>
        </div>
      </article>

      <article class="card">
        <div class="card-header">
          <h3>메모</h3>
          <span class="badge">Save</span>
        </div>
        <textarea class="memo-box" id="memoBox" placeholder="좋아하는 문장, 오늘 목표, 짧은 일기"></textarea>
        <div class="add-row">
          <button id="saveMemoBtn">메모 저장</button>
        </div>
        <div class="meta-row">
          <div class="meta-box">
            <div class="meta-label">Today</div>
            <div class="meta-value" id="todayMini">-</div>
          </div>
          <div class="meta-box">
            <div class="meta-label">D-day</div>
            <div class="meta-value" id="ddayMini">-</div>
          </div>
        </div>
      </article>
    </section>
  </div>

  <script>
    const API_URL = "/api/notion";
    const CATEGORIES = ["독서일기", "감정일기", "가계부", "스터디", "오답노트", "식단"];
    const today = new Date();

    function setHeaderDate() {
      const text = today.toLocaleDateString("ko-KR", {
        year: "numeric",
        month: "long",
        day: "numeric",
        weekday: "long"
      });
      document.getElementById("todayText").textContent = text;
      document.getElementById("todayMini").textContent = `${today.getMonth() + 1}/${today.getDate()}`;
    }

    function initDashboardTitle() {
      const input = document.getElementById("dashboardTitleInput");
      const title = document.getElementById("dashboardTitle");
      const button = document.getElementById("saveTitleBtn");

      const savedTitle = localStorage.getItem("dashboard_title") || "내 대시보드";
      input.value = savedTitle;
      title.textContent = savedTitle;
      document.title = savedTitle;

      button.addEventListener("click", () => {
        const newTitle = input.value.trim() || "내 대시보드";
        localStorage.setItem("dashboard_title", newTitle);
        title.textContent = newTitle;
        document.title = newTitle;
      });

      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") button.click();
      });
    }

    function renderCalendar() {
      const year = today.getFullYear();
      const month = today.getMonth();
      document.getElementById("monthLabel").textContent =
        `${year}.${String(month + 1).padStart(2, "0")}`;

      const firstDay = new Date(year, month, 1).getDay();
      const lastDate = new Date(year, month + 1, 0).getDate();
      const grid = document.getElementById("calendarGrid");
      grid.innerHTML = "";

      for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement("div");
        empty.className = "day empty";
        grid.appendChild(empty);
      }

      for (let d = 1; d <= lastDate; d++) {
        const cell = document.createElement("div");
        cell.className = "day";
        cell.textContent = d;
        if (d === today.getDate()) cell.classList.add("today");
        grid.appendChild(cell);
      }
    }

    function setDday() {
      const target = new Date("2026-12-31");
      const diff = Math.ceil((target - today) / (1000 * 60 * 60 * 24));
      const text = diff > 0 ? `D-${diff}` : diff === 0 ? "D-Day" : `D+${Math.abs(diff)}`;
      document.getElementById("ddayMini").textContent = text;
    }

    function extractPlaylistId(url) {
      if (!url) return "";
      try {
        const parsed = new URL(url);
        if (parsed.hostname.includes("youtube.com")) {
          return parsed.searchParams.get("list") || "";
        }
        return "";
      } catch {
        return "";
      }
    }

    function setPlaylistFrame(playlistId) {
      const frame = document.getElementById("playlistFrame");
      if (!playlistId) {
        frame.srcdoc = `
          <body style="margin:0;display:flex;align-items:center;justify-content:center;height:100%;font-family:sans-serif;background:#fff8fb;color:#b08b9b;">
            플레이리스트 링크를 넣어줘
          </body>
        `;
        return;
      }
      frame.src = `https://www.youtube.com/embed/videoseries?list=${playlistId}`;
    }

    function initPlaylist() {
      const input = document.getElementById("playlistInput");
      const button = document.getElementById("savePlaylistBtn");

      const savedUrl = localStorage.getItem("dashboard_playlist_url") || "";
      const savedId = extractPlaylistId(savedUrl);

      input.value = savedUrl;
      setPlaylistFrame(savedId);

      button.addEventListener("click", () => {
        const url = input.value.trim();
        const playlistId = extractPlaylistId(url);
        if (!playlistId) {
          alert("유튜브 플레이리스트 링크를 넣어줘");
          return;
        }
        localStorage.setItem("dashboard_playlist_url", url);
        setPlaylistFrame(playlistId);
      });

      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") button.click();
      });
    }

    function initMemo() {
      const memoBox = document.getElementById("memoBox");
      const saveMemoBtn = document.getElementById("saveMemoBtn");

      const saved = localStorage.getItem("dashboard_memo") || "";
      memoBox.value = saved;

      saveMemoBtn.addEventListener("click", () => {
        localStorage.setItem("dashboard_memo", memoBox.value);
      });
    }

    function renderCategory(category, items) {
      const card = document.querySelector(`[data-category="${category}"]`);
      if (!card) return;

      const list = card.querySelector(".list");
      list.innerHTML = "";

      const filtered = items
        .filter((item) => item.category === category)
        .sort((a, b) => (a.order || 999) - (b.order || 999));

      if (!filtered.length) {
        const empty = document.createElement("div");
        empty.className = category === "독서일기" ? "book-empty" : "empty";
        empty.textContent = "아직 없음";
        list.appendChild(empty);
        return;
      }

      if (category === "독서일기") {
        filtered.forEach((item) => {
          const wrap = document.createElement("div");
          wrap.className = "book-item";
          const firstChar = (item.name || "책").trim().charAt(0) || "책";

          wrap.innerHTML = `
            <div class="book-cover">${escapeHtml(firstChar)}</div>
            <div class="book-title">${escapeHtml(item.name)}</div>
          `;
          list.appendChild(wrap);
        });
        return;
      }

      filtered.forEach((item) => {
        const row = document.createElement("label");
        row.className = "item" + (item.done ? " done" : "");
        row.innerHTML = `
          <input type="checkbox" ${item.done ? "checked" : ""} />
          <span>${escapeHtml(item.name)}</span>
        `;

        const checkbox = row.querySelector("input");
        checkbox.addEventListener("change", async () => {
          const res = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              action: "toggle",
              id: item.id,
              done: checkbox.checked
            })
          });

          const data = await res.json();
          if (!data.ok) {
            alert("체크 업데이트 실패");
            return;
          }

          await loadTasks();
        });

        list.appendChild(row);
      });
    }

    function bindAddButtons() {
      document.querySelectorAll(".card[data-category]").forEach((card) => {
        const category = card.dataset.category;
        const input = card.querySelector(".add-row input");
        const button = card.querySelector(".add-row button");

        const submit = async () => {
          const name = input.value.trim();
          if (!name) return;

          button.disabled = true;

          try {
            const res = await fetch(API_URL, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                action: "add",
                name,
                category
              })
            });

            const data = await res.json();
            button.disabled = false;

            if (!data.ok) {
              alert("추가 실패: " + (data.error || "알 수 없는 오류"));
              return;
            }

            input.value = "";
            await loadTasks();
          } catch (err) {
            button.disabled = false;
            alert("추가 실패: 서버 연결 오류");
            console.error(err);
          }
        };

        button.addEventListener("click", submit);
        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") submit();
        });
      });
    }

    async function loadTasks() {
      const res = await fetch(API_URL);
      const data = await res.json();

      if (!data.ok) {
        console.error(data.error);
        return;
      }

      CATEGORIES.forEach((category) => renderCategory(category, data.tasks));
    }

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    setHeaderDate();
    initDashboardTitle();
    renderCalendar();
    setDday();
    bindAddButtons();
    initPlaylist();
    initMemo();
    loadTasks();
  </script>
</body>
